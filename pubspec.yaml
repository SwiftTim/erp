name: cbc_school
description: "CBC School Management System — Kenya 2026 Competency-Based Curriculum"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Local Database
  floor: ^1.5.0
  sqflite: ^2.3.3+1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3

  # Camera & Media
  image_picker: ^1.1.2

  # Connectivity
  connectivity_plus: ^6.1.0

  # Charts
  fl_chart: ^0.68.0

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  crypto: ^3.0.3
  path_provider: ^2.1.4
  path: ^1.9.0
  collection: ^1.18.0
  share_plus: ^10.1.1

  # Excel export
  excel: ^4.0.3

  # UI Helpers
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  floor_generator: ^1.5.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
